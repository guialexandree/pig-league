<section class="classification-page">
  <app-listagem-header
    eyebrow="RANKING"
    title="CLASSIFICAÇÃO"
    [showLogo]="true"
    testIdPrefix="classification"
  />

  <app-screen-loader
    [visible]="service.carregando()"
    message="Carregando classificacoes..."
    testIdPrefix="classification"
  />

  <section class="classification-layout py-4">
    <div class="container-fluid classification-layout__container">
      <div class="row g-4">
        <div class="col-12 col-xl-6">
          <app-classificacao-grupo
            [tituloGrupo]="'GRUPO 1'"
            [classificacao]="service.classificacaoGrupo1()"
            [carregando]="service.carregando()"
            [faseAtual]="service.faseAtual()"
            [erro]="service.erro()"
            (recarregar)="tentarNovamente()"
          />
        </div>

        <div class="col-12 col-xl-6">
          <app-classificacao-grupo
            [tituloGrupo]="'GRUPO 2'"
            [classificacao]="service.classificacaoGrupo2()"
            [carregando]="service.carregando()"
            [faseAtual]="service.faseAtual()"
            [erro]="service.erro()"
            (recarregar)="tentarNovamente()"
          />
        </div>

        <div class="col-12">
          <div class="container">
            <app-classificacao-grupo
              [tituloGrupo]="'RESULTADO GERAL FASE DE GRUPOS'"
              [classificacao]="service.classificacaoGeral()"
              [carregando]="service.carregando()"
              [faseAtual]="service.faseAtual()"
              [erro]="service.erro()"
              (recarregar)="tentarNovamente()"
            />
          </div>
        </div>
      </div>
    </div>
  </section>
</section>
