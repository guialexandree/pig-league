<section class="classification-page">
  <app-listagem-header
    eyebrow="RANKING"
    title="CLASSIFICAÇÃO"
    [showLogo]="false"
    testIdPrefix="classification"
  />

  <app-screen-loader
    [visible]="carregandoTela()"
    message="Carregando classificacoes..."
    testIdPrefix="classification"
  />

  <section class="classification-layout py-4">
    <div class="container-fluid classification-layout__container">
      <p class="classification-layout__phase" data-testid="phase-label">Fase Regular</p>

      <div class="row g-4">
        <div class="col-12 col-xl-6">
          <app-classificacao-grupo
            [tituloGrupo]="'GRUPO 1'"
            [filtroInicial]="1"
            (carregandoChange)="atualizarCarregamento('grupo1', $event)"
          />
        </div>

        <div class="col-12 col-xl-6">
          <app-classificacao-grupo
            [tituloGrupo]="'GRUPO 2'"
            [filtroInicial]="2"
            (carregandoChange)="atualizarCarregamento('grupo2', $event)"
          />
        </div>

        <div class="col-12">
          <app-classificacao-grupo
            [tituloGrupo]="'RESULTADO GERAL'"
            [filtroInicial]="'GERAL'"
            (carregandoChange)="atualizarCarregamento('geral', $event)"
          />
        </div>
      </div>
    </div>
  </section>
</section>
